<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문산 열린학원 - 누적 학습 분석 리포트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 이미지 저장을 위한 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f5f7;
        }
        .header-bg {
            background-color: #111827;
        }
        .progress-bar-fill {
            transition: width 1s ease-out;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 인쇄할 때 상단 컨트롤 바 숨기기 */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            .header-bg { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 p-6 max-w-7xl mx-auto relative" id="reportArea">

    <!-- 데이터 로딩 중 화면 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center no-print">
        <div class="loader mb-4"></div>
        <p class="text-gray-600 font-bold">학생 데이터를 불러오는 중입니다...</p>
    </div>

    <!-- 상단 컨트롤 바 (no-print 클래스 추가됨) -->
    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-6 border border-gray-100 no-print">
        <div class="flex items-center gap-2 w-1/3">
            <select id="studentSelect" class="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none font-medium cursor-pointer">
                <option value="">데이터를 불러오는 중...</option>
            </select>
        </div>
        <div class="flex gap-2">
            <!-- 작동 안 하던 버튼들 기능 완벽 복구 -->
            <button onclick="window.print()" class="flex items-center gap-2 bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors">
                <i data-lucide="printer" class="w-4 h-4"></i> 출력
            </button>
            <button onclick="copyToClipboard()" class="flex items-center gap-2 border border-blue-500 text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-lg text-sm font-bold transition-colors bg-white">
                <i data-lucide="link" class="w-4 h-4"></i> 링크 복사
            </button>
            <button onclick="saveAsImage()" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors">
                <i data-lucide="download" class="w-4 h-4"></i> 이미지 저장
            </button>
        </div>
    </div>

    <!-- 메인 대시보드 헤더 -->
    <div class="header-bg rounded-3xl p-8 mb-8 text-white flex justify-between items-center shadow-lg relative overflow-hidden" id="captureArea">
        <div class="absolute right-0 top-0 w-64 h-64 bg-white opacity-5 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
        
        <div class="flex items-center gap-6 relative z-10">
            <!-- 깃허브 폴더에 업로드된 로고 이미지 연결 -->
            <div class="flex items-center gap-2 text-white">
                <img src="열린학원로고(누끼).png" alt="열린학원 로고" class="h-10 object-contain" onerror="this.src='https://via.placeholder.com/150x50/111827/FFFFFF?text=Yeollin+Academy'">
            </div>
            
            <div class="h-10 w-px bg-gray-600"></div>
            
            <div>
                <div class="flex items-end gap-2 mb-1">
                    <h1 class="text-3xl font-black" id="headerName">-</h1>
                    <span class="text-gray-300 font-medium mb-1">학생</span>
                </div>
                <p class="text-sm text-gray-400">고1_2. 서울대2반 | 교재점검 누적리포트</p>
            </div>
        </div>

        <!-- 토탈 달성률 -->
        <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-4 flex items-center gap-4 relative z-10">
            <div>
                <p class="text-[10px] text-gray-300 font-bold tracking-widest uppercase mb-1">Total Rate</p>
                <div class="flex items-baseline gap-1">
                    <span class="text-3xl font-black" id="totalRate">0</span>
                    <span class="text-lg font-bold text-gray-300">%</span>
                </div>
            </div>
            <!-- 색상이 변하는 아이콘 컨테이너 -->
            <div id="totalRateContainer" class="w-12 h-12 bg-rose-500 rounded-full flex items-center justify-center shadow-lg shadow-rose-500/30 text-white">
                <i data-lucide="check" class="w-6 h-6 stroke-[3]"></i>
            </div>
        </div>
    </div>

    <!-- 메인 컨텐츠 영역 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- 왼쪽 열: 최근 과제 수행 추이 & 코멘트 -->
        <div class="flex flex-col gap-6">
            <!-- 제목을 흰 박스 밖으로 뺌 -->
            <div>
                <div class="flex items-center gap-2 mb-4 px-2">
                    <i data-lucide="trending-up" class="w-5 h-5 text-gray-800"></i>
                    <h2 class="text-lg font-bold text-gray-800">최근 과제 수행 추이</h2>
                </div>
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 min-h-[250px]">
                    <div class="space-y-5" id="sessionProgressContainer">
                        <!-- JS로 동적 생성됨 -->
                    </div>
                </div>
            </div>

            <!-- 선생님 코멘트 -->
            <div class="bg-indigo-50/50 rounded-3xl p-6 border border-indigo-100 relative mt-4">
                <div class="inline-flex items-center gap-2 bg-white border border-indigo-200 text-indigo-600 px-3 py-1 rounded-full text-xs font-bold mb-4 shadow-sm -mt-10">
                    <i data-lucide="message-circle" class="w-3 h-3"></i> Teacher's Comment
                </div>
                <p id="teacherComment" class="text-sm text-gray-700 font-medium leading-relaxed whitespace-pre-wrap">
                    불러오는 중입니다...
                </p>
            </div>
        </div>

        <!-- 오른쪽 열: 단원별 누적 학습 현황 -->
        <div class="lg:col-span-2">
            <div class="flex items-center gap-2 mb-4 px-2">
                <i data-lucide="layout-grid" class="w-5 h-5 text-gray-800"></i>
                <h2 class="text-lg font-bold text-gray-800">교재별 누적 학습 현황</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="textbookContainer">
                <!-- JS로 동적 생성됨 -->
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let globalSheetData = [];

        // 색상 팔레트 (회차별, 단원별로 다르게 적용하기 위함)
        const colorPalette = [
            {bg: 'bg-blue-500', track: 'bg-blue-100', text: 'text-blue-600'},
            {bg: 'bg-indigo-500', track: 'bg-indigo-100', text: 'text-indigo-600'},
            {bg: 'bg-violet-500', track: 'bg-violet-100', text: 'text-violet-600'},
            {bg: 'bg-emerald-500', track: 'bg-emerald-100', text: 'text-emerald-600'},
            {bg: 'bg-amber-500', track: 'bg-amber-100', text: 'text-amber-600'},
            {bg: 'bg-rose-500', track: 'bg-rose-100', text: 'text-rose-600'}
        ];

        // ★★★ [매우 중요] 깃허브 올리실 때 구글 웹앱 URL은 그대로 유지하세요! ★★★
        const GAS_URL = "https://script.google.com/macros/s/AKfycbya59NwpvmaaPXbhvuvIDf4spaGy_M7m4nzjgqykvlGUdIf6Hmd5veavpVal_ogFwpD9w/exec";

        // ---- 버튼 기능 구현 ----
        function copyToClipboard() {
            navigator.clipboard.writeText(window.location.href)
                .then(() => alert("학부모님께 전송할 리포트 주소가 복사되었습니다!"))
                .catch(() => alert("복사에 실패했습니다. 주소창의 URL을 직접 복사해주세요."));
        }

        function saveAsImage() {
            alert("이미지 변환을 시작합니다. 잠시만 기다려주세요.");
            // 버튼이 포함된 컨트롤 바를 숨기고 캡처
            const overlay = document.querySelector('.no-print');
            overlay.style.display = 'none';
            
            html2canvas(document.body, { backgroundColor: '#f4f5f7', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = document.getElementById('headerName').innerText + "_분석리포트.png";
                link.href = canvas.toDataURL("image/png");
                link.click();
                overlay.style.display = 'flex'; // 캡처 후 다시 표시
            });
        }
        // ------------------------

        window.onload = () => {
            // URL 확인 및 가이드
            if (GAS_URL.includes("여기에_구글_스크립트_웹앱_URL")) {
                document.getElementById('loadingOverlay').innerHTML = `
                    <div class="bg-white p-6 rounded-xl shadow-lg text-center">
                        <p class="text-red-500 font-bold mb-2">구글 웹앱 URL이 입력되지 않았습니다!</p>
                        <p class="text-sm text-gray-600">HTML 파일의 GAS_URL 부분에 발급받은 주소를 넣어주세요.</p>
                    </div>`;
                return;
            }

            fetch(GAS_URL)
                .then(response => response.json())
                .then(data => onDataLoaded(data))
                .catch(error => onError(error));
        };

        function onDataLoaded(data) {
            globalSheetData = data;
            
            const uniqueStudents = [...new Set(data.map(row => row['이름']).filter(name => name))];
            const selectElement = document.getElementById('studentSelect');
            selectElement.innerHTML = '';
            
            if (uniqueStudents.length === 0) {
                selectElement.innerHTML = '<option value="">데이터가 없습니다</option>';
            } else {
                uniqueStudents.forEach(studentName => {
                    const option = document.createElement('option');
                    option.value = studentName;
                    option.textContent = `[고1_2. 서울대2반] ${studentName}`;
                    selectElement.appendChild(option);
                });
                
                const defaultStudent = uniqueStudents[0];
                selectElement.value = defaultStudent;
                renderDashboard(defaultStudent);
            }
            
            selectElement.addEventListener('change', (e) => renderDashboard(e.target.value));
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function onError(error) {
            console.error('데이터 로드 실패:', error);
            document.getElementById('loadingOverlay').innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow-lg text-center">
                    <p class="text-red-500 font-bold mb-2">데이터를 불러오는데 실패했습니다.</p>
                    <p class="text-sm text-gray-600">URL 주소가 정확한지 확인해주세요.</p>
                </div>`;
        }

        // 미완료 페이지 수 정밀 계산
        function calculateIncompletePages(incompleteStr) {
            if (!incompleteStr) return 0;
            let count = 0;
            const parts = String(incompleteStr).split(',');
            
            parts.forEach(part => {
                const cleanPart = part.trim();
                if (cleanPart.includes('~') || cleanPart.includes('-')) {
                    const separator = cleanPart.includes('~') ? '~' : '-';
                    const [start, end] = cleanPart.split(separator).map(Number);
                    if (!isNaN(start) && !isNaN(end) && end >= start) {
                        count += (end - start + 1);
                    }
                } else if (cleanPart !== '' && !isNaN(Number(cleanPart))) {
                    count += 1;
                }
            });
            return count;
        }

        function renderDashboard(targetStudent) {
            if (!targetStudent) return;
            
            document.getElementById('headerName').innerText = targetStudent;
            const studentData = globalSheetData.filter(row => row['이름'] === targetStudent);
            
            let totalPagesAll = 0;
            let completedPagesAll = 0;
            let lastComment = "작성된 선생님 코멘트가 없습니다.";
            
            const sessionData = {}; 
            const textbookData = {};

            studentData.forEach(row => {
                const start = parseInt(row['검사시작']) || 0;
                const end = parseInt(row['검사끝']) || 0;
                
                let totalRowPages = 0;
                if (end >= start && end > 0) {
                    totalRowPages = (end - start) + 1;
                }
                
                const incompleteRowPages = calculateIncompletePages(row['미완료']);
                const completedRowPages = Math.max(0, totalRowPages - incompleteRowPages);

                totalPagesAll += totalRowPages;
                completedPagesAll += completedRowPages;

                // 회차별 데이터 취합
                const session = row['회차'];
                if (session) {
                    if (!sessionData[session]) sessionData[session] = { total: 0, completed: 0 };
                    sessionData[session].total += totalRowPages;
                    sessionData[session].completed += completedRowPages;
                }

                // 교재별/상세 내역 취합
                const textbook = row['교재명'];
                if (textbook) {
                    if (!textbookData[textbook]) textbookData[textbook] = { total: 0, completed: 0, details: [] };
                    textbookData[textbook].total += totalRowPages;
                    textbookData[textbook].completed += completedRowPages;
                    
                    // 단원(세부) 정보 저장
                    if (totalRowPages > 0) {
                        textbookData[textbook].details.push({
                            session: session || '-',
                            start: start,
                            end: end,
                            totalRowPages: totalRowPages,
                            percent: Math.round((completedRowPages / totalRowPages) * 100)
                        });
                    }
                }

                if (row['특이사항'] && String(row['특이사항']).trim() !== '') {
                    lastComment = row['특이사항'];
                }
            });

            // --- 1. 토탈 달성률 계산 및 색상 변경 로직 적용 ---
            let totalRate = totalPagesAll > 0 ? Math.round((completedPagesAll / totalPagesAll) * 100) : 0;
            document.getElementById('totalRate').innerText = totalRate;
            
            const rateContainer = document.getElementById('totalRateContainer');
            rateContainer.className = "w-12 h-12 rounded-full flex items-center justify-center shadow-lg text-white transition-colors duration-500";
            
            if (totalRate >= 90) {
                rateContainer.classList.add('bg-emerald-500', 'shadow-emerald-500/30'); // 90 이상 초록
            } else if (totalRate >= 70) {
                rateContainer.classList.add('bg-blue-500', 'shadow-blue-500/30'); // 70 이상 파랑
            } else if (totalRate >= 50) {
                rateContainer.classList.add('bg-amber-500', 'shadow-amber-500/30'); // 50 이상 노랑
            } else {
                rateContainer.classList.add('bg-rose-500', 'shadow-rose-500/30'); // 그 이하 빨강
            }

            document.getElementById('teacherComment').innerText = `"${lastComment}"`;

            // --- 2. 최근 과제 수행 추이 (회차별 색상 다르게) ---
            const sessionContainer = document.getElementById('sessionProgressContainer');
            sessionContainer.innerHTML = '';
            const sortedSessions = Object.keys(sessionData).sort();
            
            if(sortedSessions.length === 0) {
                sessionContainer.innerHTML = '<p class="text-sm text-gray-500">수행 내역이 없습니다.</p>';
            }

            sortedSessions.forEach((session, index) => {
                const data = sessionData[session];
                let percent = data.total > 0 ? Math.round((data.completed / data.total) * 100) : 0;
                
                // 팔레트에서 색상 가져오기 (회차마다 다르게)
                const colors = colorPalette[index % colorPalette.length];

                const html = `
                    <div class="flex items-center gap-4">
                        <span class="w-12 text-sm font-bold text-gray-600">${session}</span>
                        <div class="flex-1 ${colors.track} h-2.5 rounded-full overflow-hidden">
                            <div class="${colors.bg} h-full rounded-full progress-bar-fill" style="width: 0%" data-width="${percent}%"></div>
                        </div>
                        <span class="w-10 text-right text-sm font-black text-gray-800">${percent}%</span>
                    </div>`;
                sessionContainer.insertAdjacentHTML('beforeend', html);
            });

            // --- 3. 교재별 누적 학습 현황 (단원 상세 내역 포함) ---
            const textbookContainer = document.getElementById('textbookContainer');
            textbookContainer.innerHTML = '';

            if(Object.keys(textbookData).length === 0) {
                textbookContainer.innerHTML = '<p class="text-sm text-gray-500 p-4">교재 데이터가 없습니다.</p>';
            }

            Object.keys(textbookData).forEach(bookName => {
                const data = textbookData[bookName];
                let percent = data.total > 0 ? Math.round((data.completed / data.total) * 100) : 0;
                
                // 단원별(기록장 줄 별) 시작, 끝, 총 페이지 상세 내역 HTML 생성
                let detailsHtml = data.details.map((detail, idx) => {
                    const c = colorPalette[idx % colorPalette.length];
                    return `
                    <div class="flex justify-between items-center text-xs mt-3">
                        <div class="flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full ${c.bg}"></span>
                            <span class="font-bold text-gray-700 w-10">${detail.session}</span>
                            <span class="text-gray-500 bg-gray-50 px-1.5 py-0.5 rounded border border-gray-100">${detail.start}p ~ ${detail.end}p</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-gray-400 font-medium">(총 ${detail.totalRowPages}p)</span>
                            <span class="font-black ${c.text}">${detail.percent}%</span>
                        </div>
                    </div>
                    `;
                }).join('');

                const html = `
                    <div class="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="font-bold text-gray-800 text-sm truncate flex-1 pr-2">${bookName}</h3>
                                <span class="text-xl font-black text-blue-600">${percent}%</span>
                            </div>
                            <!-- 누적 게이지 -->
                            <div class="w-full bg-blue-50 h-2 rounded-full overflow-hidden mb-2">
                                <div class="bg-blue-500 h-full rounded-full progress-bar-fill" style="width: 0%" data-width="${percent}%"></div>
                            </div>
                            <p class="text-xs text-right text-gray-400 font-medium mb-4">누적 ${data.total}p</p>
                        </div>
                        
                        <!-- 단원별(상세) 진도 현황 -->
                        <div class="border-t border-gray-100 pt-2">
                            ${detailsHtml}
                        </div>
                    </div>`;
                textbookContainer.insertAdjacentHTML('beforeend', html);
            });

            // 애니메이션 지연 실행
            setTimeout(() => {
                document.querySelectorAll('.progress-bar-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-width');
                });
            }, 50);
        }
    </script>
</body>
</html>
