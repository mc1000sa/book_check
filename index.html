<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문산 열린학원 - 일일 학습 분석 리포트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
        }
        /* 원형 프로그래스 바 애니메이션 효과 */
        .progress-ring__circle {
            transition: stroke-dashoffset 1s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- 리포트 메인 카드 -->
    <div class="bg-white w-full max-w-md rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        
        <!-- 헤더 영역 -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 text-white text-center relative">
            <h1 class="text-2xl font-black tracking-tight">일일 학습 분석 리포트</h1>
            <p class="text-blue-100 text-sm mt-1 font-medium">문산 열린학원 고등부</p>
            <div class="absolute top-4 right-4 bg-white/20 px-3 py-1 rounded-full text-xs font-bold backdrop-blur-sm">
                <span id="reportDate">2026.04.18</span>
            </div>
        </div>

        <!-- 학생 정보 영역 -->
        <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-end">
            <div>
                <p class="text-sm text-gray-500 font-medium mb-1">수학 집중관리</p>
                <div class="flex items-baseline gap-2">
                    <h2 class="text-3xl font-extrabold text-gray-800" id="studentName">국한울</h2>
                    <span class="text-lg text-gray-600 font-medium">학생</span>
                </div>
            </div>
            <div class="text-right">
                <span id="courseName" class="inline-block bg-indigo-50 text-indigo-700 px-3 py-1 rounded-lg text-sm font-bold border border-indigo-100">
                    수1
                </span>
            </div>
        </div>

        <!-- 핵심 성취도 (원형 프로그래스) -->
        <div class="p-6 flex flex-col items-center">
            <h3 class="text-sm font-bold text-gray-400 mb-4 tracking-wider uppercase">오늘의 목표 달성률</h3>
            
            <div class="relative w-40 h-40 flex items-center justify-center">
                <!-- SVG 프로그래스 바 -->
                <svg class="w-full h-full absolute top-0 left-0" viewBox="0 0 120 120">
                    <circle class="text-gray-100" stroke-width="12" stroke="currentColor" fill="transparent" r="50" cx="60" cy="60" />
                    <circle id="progressCircle" class="text-blue-600 progress-ring__circle" stroke-width="12" stroke-linecap="round" stroke="currentColor" fill="transparent" r="50" cx="60" cy="60" />
                </svg>
                <div class="text-center z-10 flex flex-col items-center">
                    <span id="progressPercent" class="text-4xl font-black text-gray-800">0%</span>
                </div>
            </div>

            <!-- 학습량 상세 수치 -->
            <div class="w-full grid grid-cols-3 gap-2 mt-6">
                <div class="bg-gray-50 rounded-xl p-3 text-center">
                    <p class="text-xs text-gray-500 font-medium">총 페이지</p>
                    <p class="text-lg font-bold text-gray-800 mt-1"><span id="totalPages">0</span><span class="text-sm font-normal text-gray-500">p</span></p>
                </div>
                <div class="bg-blue-50 rounded-xl p-3 text-center border border-blue-100">
                    <p class="text-xs text-blue-600 font-bold">완료</p>
                    <p class="text-lg font-black text-blue-700 mt-1"><span id="completedPages">0</span><span class="text-sm font-normal text-blue-500">p</span></p>
                </div>
                <div class="bg-red-50 rounded-xl p-3 text-center">
                    <p class="text-xs text-red-500 font-medium">미완료</p>
                    <p class="text-lg font-bold text-red-600 mt-1"><span id="incompletePages">0</span><span class="text-sm font-normal text-red-400">p</span></p>
                </div>
            </div>
        </div>

        <!-- 단원 및 교재 정보 -->
        <div class="px-6 py-4 bg-gray-50 border-t border-b border-gray-100">
            <div class="flex items-start gap-3 mb-3">
                <div class="bg-white p-2 rounded-lg shadow-sm">
                    <i data-lucide="book-open" class="w-5 h-5 text-indigo-500"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-500 font-medium">학습 교재</p>
                    <p id="textbookName" class="text-sm font-bold text-gray-800">로딩중...</p>
                </div>
            </div>
            <div class="flex items-start gap-3">
                <div class="bg-white p-2 rounded-lg shadow-sm">
                    <i data-lucide="target" class="w-5 h-5 text-indigo-500"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-500 font-medium">학습 단원</p>
                    <p id="unitName" class="text-sm font-bold text-gray-800">로딩중...</p>
                </div>
            </div>
        </div>

        <!-- 선생님 코멘트 -->
        <div class="p-6">
            <div class="flex items-center gap-2 mb-3">
                <h3 class="text-sm font-bold text-gray-800">선생님 총평</h3>
                <span id="evaluationBadge" class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded font-bold">훌륭합니다</span>
            </div>
            <div class="bg-blue-50/50 rounded-xl p-4 border border-blue-100 relative">
                <i data-lucide="quote" class="w-6 h-6 text-blue-200 absolute top-3 right-3 rotate-180"></i>
                <p id="teacherComment" class="text-sm text-gray-700 leading-relaxed font-medium relative z-10">
                    내용을 불러오는 중입니다...
                </p>
            </div>
        </div>

        <!-- 하단 푸터 -->
        <div class="bg-gray-800 p-4 text-center">
            <p class="text-gray-400 text-xs">본 리포트는 문산 열린학원 고등부 성적분석 시스템에서 발송되었습니다.</p>
        </div>
    </div>

    <script>
        // 아이콘 초기화
        lucide.createIcons();

        // 1. 구글 시트에서 가져올 가상의 데이터 (선생님의 시트 헤더명과 100% 일치시킴!)
        // 실제 연동 시에는 이 부분을 구글 앱스 스크립트(google.script.run)에서 받아오도록 수정하면 됩니다.
        const sheetData = {
            "날짜": "4/18",
            "이름": "국한울",
            "과정": "수1",
            "대단원": "삼각함수",
            "소단원": "삼각함수",
            "검사시작": 72,      // <--- 수정된 헤더명 완벽 반영!
            "검사끝": 81,        // <--- 수정된 헤더명 완벽 반영!
            "미완료": 0,
            "교재명": "RPM",     // <--- 수정된 헤더명 완벽 반영!
            "특이사항": "BEST!! ★★★★★\n과제 완성도가 매우 높고 오답정리까지 완벽하게 해왔습니다. 이 기세로 가면 1등급 무난합니다!",
            "총평선택": "훌륭합니다"
        };

        // 2. 데이터 분석 및 계산 로직 (에러의 원인이었던 null 문제 해결)
        function analyzeData(data) {
            // 빈 칸이거나 문자가 섞여있어도 안전하게 숫자로 변환 (값이 없으면 0으로 처리)
            const startPage = parseInt(data['검사시작']) || 0;
            const endPage = parseInt(data['검사끝']) || 0;
            const incompletePages = parseInt(data['미완료']) || 0;

            // 총 페이지수 계산 로직
            let totalPages = 0;
            if (endPage >= startPage && endPage > 0) {
                totalPages = (endPage - startPage) + 1;
            }

            // 완료된 페이지 및 달성률 계산
            const completedPages = Math.max(0, totalPages - incompletePages);
            let achievementRate = 0;
            if (totalPages > 0) {
                achievementRate = Math.round((completedPages / totalPages) * 100);
            }

            // 계산된 데이터 화면에 뿌려주기
            document.getElementById('reportDate').innerText = `2026.${data['날짜'].replace('/', '.')}`;
            document.getElementById('studentName').innerText = data['이름'];
            document.getElementById('courseName').innerText = data['과정'];
            document.getElementById('textbookName').innerText = data['교재명'];
            document.getElementById('unitName').innerText = `${data['대단원']} > ${data['소단원']}`;
            
            document.getElementById('totalPages').innerText = totalPages;
            document.getElementById('completedPages').innerText = completedPages;
            document.getElementById('incompletePages').innerText = incompletePages;
            document.getElementById('progressPercent').innerText = `${achievementRate}%`;
            document.getElementById('teacherComment').innerText = data['특이사항'];
            document.getElementById('evaluationBadge').innerText = data['총평선택'];

            // 원형 차트 애니메이션 실행
            animateProgressRing(achievementRate);
        }

        // 3. 원형 차트 애니메이션 함수
        function animateProgressRing(percent) {
            const circle = document.getElementById('progressCircle');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.strokeDashoffset = circumference;

            // 달성률에 따른 색상 변화 (100%면 파란색, 낮으면 주황색/빨간색 등)
            if (percent === 100) {
                circle.classList.replace('text-blue-600', 'text-indigo-600');
            } else if (percent < 50) {
                circle.classList.replace('text-blue-600', 'text-red-500');
            }

            setTimeout(() => {
                const offset = circumference - (percent / 100) * circumference;
                circle.style.strokeDashoffset = offset;
            }, 100);
        }

        // 페이지 로드 시 가상 데이터로 화면 그리기 실행
        window.onload = () => {
            analyzeData(sheetData);
        };
    </script>
</body>
</html>
