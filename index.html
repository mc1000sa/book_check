<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문산 열린학원 - 누적 학습 분석 리포트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f5f7;
        }
        .header-bg {
            background-color: #111827;
        }
        .progress-bar-fill {
            transition: width 1s ease-out;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 p-6 max-w-7xl mx-auto relative">

    <!-- 데이터 로딩 중 화면 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-gray-600 font-bold" id="loadingText">학생 데이터를 불러오는 중입니다...</p>
    </div>

    <!-- 상단 컨트롤 바 -->
    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-6 border border-gray-100">
        <div class="flex items-center gap-2 w-1/3">
            <select id="studentSelect" class="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none font-medium">
                <option value="">데이터를 불러오는 중...</option>
            </select>
        </div>
        <div class="flex gap-2">
            <button class="flex items-center gap-2 bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors">
                <i data-lucide="printer" class="w-4 h-4"></i> 출력
            </button>
            <button class="flex items-center gap-2 border border-blue-500 text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-lg text-sm font-bold transition-colors bg-white">
                <i data-lucide="send" class="w-4 h-4"></i> 링크 전송
            </button>
            <button class="flex items-center gap-2 bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors">
                <i data-lucide="download" class="w-4 h-4"></i> 이미지 저장
            </button>
        </div>
    </div>

    <!-- 메인 대시보드 헤더 -->
    <div class="header-bg rounded-3xl p-8 mb-8 text-white flex justify-between items-center shadow-lg relative overflow-hidden">
        <div class="absolute right-0 top-0 w-64 h-64 bg-white opacity-5 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
        
        <div class="flex items-center gap-6 relative z-10">
            <!-- 깨지지 않는 자체 제작 열린학원 로고 (이미지 링크 불필요) -->
            <div class="flex items-center gap-2 text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    <path d="m9 10 2 2 4-4"></path>
                </svg>
                <span class="text-2xl font-black tracking-tight" style="font-family: 'Noto Sans KR', sans-serif;">열린학원</span>
            </div>
            
            <div class="h-10 w-px bg-gray-600"></div>
            
            <div>
                <div class="flex items-end gap-2 mb-1">
                    <h1 class="text-3xl font-black" id="headerName">-</h1>
                    <span class="text-gray-300 font-medium mb-1">학생</span>
                </div>
                <p class="text-sm text-gray-400">고1_2. 서울대2반 | 교재점검 누적리포트</p>
            </div>
        </div>

        <!-- 토탈 달성률 -->
        <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-4 flex items-center gap-4 relative z-10">
            <div>
                <p class="text-[10px] text-gray-300 font-bold tracking-widest uppercase mb-1">Total Rate</p>
                <div class="flex items-baseline gap-1">
                    <span class="text-3xl font-black" id="totalRate">0</span>
                    <span class="text-lg font-bold text-gray-300">%</span>
                </div>
            </div>
            <div class="w-12 h-12 bg-rose-500 rounded-full flex items-center justify-center shadow-lg shadow-rose-500/30">
                <i data-lucide="check" class="w-6 h-6 text-white stroke-[3]"></i>
            </div>
        </div>
    </div>

    <!-- 메인 컨텐츠 영역 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- 왼쪽 열: 최근 과제 수행 추이 & 코멘트 -->
        <div class="flex flex-col gap-6">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 min-h-[250px]">
                <div class="flex items-center gap-2 mb-6">
                    <i data-lucide="trending-up" class="w-5 h-5 text-gray-800"></i>
                    <h2 class="text-lg font-bold text-gray-800">최근 과제 수행 추이</h2>
                </div>
                <div class="space-y-5" id="sessionProgressContainer">
                    <!-- JS로 동적 생성됨 -->
                </div>
            </div>

            <!-- 선생님 코멘트 -->
            <div class="bg-indigo-50/50 rounded-3xl p-6 border border-indigo-100 relative">
                <div class="inline-flex items-center gap-2 bg-white border border-indigo-200 text-indigo-600 px-3 py-1 rounded-full text-xs font-bold mb-4 shadow-sm -mt-10">
                    <i data-lucide="message-circle" class="w-3 h-3"></i> Teacher's Comment
                </div>
                <p id="teacherComment" class="text-sm text-gray-700 font-medium leading-relaxed">
                    로딩 중입니다...
                </p>
            </div>
        </div>

        <!-- 오른쪽 열: 단원별 누적 학습 현황 -->
        <div class="lg:col-span-2">
            <div class="flex items-center gap-2 mb-4 px-2">
                <i data-lucide="layout-grid" class="w-5 h-5 text-gray-800"></i>
                <h2 class="text-lg font-bold text-gray-800">교재별 누적 학습 현황</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="textbookContainer">
                <!-- JS로 동적 생성됨 -->
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let globalSheetData = [];

        // 우측 미리보기용 임시 데이터 (선생님 시트 사진과 똑같이 구성했습니다)
        const mockDataForPreview = [
            { "이름": "고준화", "회차": "1회차", "검사시작": 1, "검사끝": 19, "미완료": "14~19", "특이사항": "오답에 대한 정확한 표시와 다시 풀어보는 문제들을...", "교재명": "블랙라벨(공통수학1)" },
            { "이름": "고준화", "회차": "2회차", "검사시작": 20, "검사끝": 26, "미완료": "21~26", "특이사항": "", "교재명": "블랙라벨(공통수학1)" },
            { "이름": "고준화", "회차": "1회차", "검사시작": 6, "검사끝": 19, "미완료": "19", "특이사항": "교재 점검이 있을시 푼데까지는 채점을...", "교재명": "RPM(공통수학1)" },
            { "이름": "고준화", "회차": "2회차", "검사시작": 44, "검사끝": 54, "미완료": "50,51,54", "특이사항": "", "교재명": "RPM(공통수학1)" },
            { "이름": "국한울", "회차": "1회차", "검사시작": 1, "검사끝": 19, "미완료": "", "특이사항": "BEST!! ★★★★★ - 채점, 오답복습, 식세우는 습관 등등 모든게 완벽함", "교재명": "블랙라벨(공통수학1)" },
            { "이름": "국한울", "회차": "2회차", "검사시작": 20, "검사끝": 26, "미완료": "26", "특이사항": "", "교재명": "블랙라벨(공통수학1)" },
            { "이름": "국한울", "회차": "1회차", "검사시작": 6, "검사끝": 19, "미완료": "", "특이사항": "", "교재명": "RPM(공통수학1)" },
            { "이름": "국한울", "회차": "2회차", "검사시작": 44, "검사끝": 54, "미완료": "", "특이사항": "BEST!! ★★★★ - 과제를 완벽하게 해오고, 오답문항도 고쳐옴", "교재명": "RPM(공통수학1)" },
            { "이름": "권희주", "회차": "1회차", "검사시작": 1, "검사끝": 19, "미완료": "15~19", "특이사항": "풀이를 이면지에 풀었는데 가지고 오지 않아서 풀이 확인을 못함.", "교재명": "블랙라벨(공통수학1)" },
            { "이름": "권희주", "회차": "2회차", "검사시작": 44, "검사끝": 54, "미완료": "49~54", "특이사항": "이번 회차에 과제를 거의 못해옴. 개인상담 진행함", "교재명": "RPM(공통수학1)" }
        ];

        window.onload = () => {
            // 구글 앱스 스크립트 환경(실제 배포)인지 확인
            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(onDataLoaded)
                    .withFailureHandler(onError)
                    .getDashboardData(); // 백엔드 데이터 호출
            } else {
                // 우측 Preview 캔버스 환경 (에러 띄우지 않고 임시 데이터 보여줌)
                console.log("미리보기 환경: 시트 데이터 대신 임시 데이터를 렌더링합니다.");
                setTimeout(() => {
                    onDataLoaded(mockDataForPreview);
                }, 500); // 로딩 효과 살짝 주기
            }
        };

        function onDataLoaded(data) {
            globalSheetData = data;
            
            // 이름 추출 및 드롭다운 생성
            const uniqueStudents = [...new Set(data.map(row => row['이름']).filter(name => name))];
            const selectElement = document.getElementById('studentSelect');
            selectElement.innerHTML = '';
            
            if (uniqueStudents.length === 0) {
                selectElement.innerHTML = '<option value="">데이터가 없습니다</option>';
            } else {
                uniqueStudents.forEach(studentName => {
                    const option = document.createElement('option');
                    option.value = studentName;
                    option.textContent = `[고1_2. 서울대2반] ${studentName}`;
                    selectElement.appendChild(option);
                });
                
                // 첫 번째 학생 렌더링 (예: 국한울이 있으면 국한울 우선 선택)
                const defaultStudent = uniqueStudents.includes('국한울') ? '국한울' : uniqueStudents[0];
                selectElement.value = defaultStudent;
                renderDashboard(defaultStudent);
            }
            
            selectElement.addEventListener('change', (e) => {
                renderDashboard(e.target.value);
            });

            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function onError(error) {
            console.error('데이터 로드 실패:', error);
            alert("데이터를 불러오는데 실패했습니다. Code.gs를 확인해주세요.");
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // 미완료 페이지 수 정밀 계산 로직
        function calculateIncompletePages(incompleteStr) {
            if (!incompleteStr) return 0;
            let count = 0;
            const parts = String(incompleteStr).split(',');
            
            parts.forEach(part => {
                const cleanPart = part.trim();
                if (cleanPart.includes('~') || cleanPart.includes('-')) {
                    const separator = cleanPart.includes('~') ? '~' : '-';
                    const [start, end] = cleanPart.split(separator).map(Number);
                    if (!isNaN(start) && !isNaN(end) && end >= start) {
                        count += (end - start + 1);
                    }
                } else if (cleanPart !== '' && !isNaN(Number(cleanPart))) {
                    count += 1;
                }
            });
            return count;
        }

        function renderDashboard(targetStudent) {
            if (!targetStudent) return;
            
            document.getElementById('headerName').innerText = targetStudent;
            const studentData = globalSheetData.filter(row => row['이름'] === targetStudent);
            
            let totalPagesAll = 0;
            let completedPagesAll = 0;
            let lastComment = "작성된 선생님 코멘트가 없습니다.";
            
            const sessionData = {}; 
            const textbookData = {};

            studentData.forEach(row => {
                const start = parseInt(row['검사시작']) || 0;
                const end = parseInt(row['검사끝']) || 0;
                
                let totalRowPages = 0;
                if (end >= start && end > 0) {
                    totalRowPages = (end - start) + 1;
                }
                
                const incompleteRowPages = calculateIncompletePages(row['미완료']);
                const completedRowPages = Math.max(0, totalRowPages - incompleteRowPages);

                totalPagesAll += totalRowPages;
                completedPagesAll += completedRowPages;

                const session = row['회차'];
                if (session) {
                    if (!sessionData[session]) sessionData[session] = { total: 0, completed: 0 };
                    sessionData[session].total += totalRowPages;
                    sessionData[session].completed += completedRowPages;
                }

                const textbook = row['교재명'];
                if (textbook) {
                    if (!textbookData[textbook]) textbookData[textbook] = { total: 0, completed: 0 };
                    textbookData[textbook].total += totalRowPages;
                    textbookData[textbook].completed += completedRowPages;
                }

                if (row['특이사항'] && String(row['특이사항']).trim() !== '') {
                    lastComment = row['특이사항'];
                }
            });

            // 상단 토탈 달성률
            let totalRate = 0;
            if (totalPagesAll > 0) {
                totalRate = Math.round((completedPagesAll / totalPagesAll) * 100);
            }
            document.getElementById('totalRate').innerText = totalRate;
            document.getElementById('teacherComment').innerText = `"${lastComment}"`;

            // 회차별 그래프
            const sessionContainer = document.getElementById('sessionProgressContainer');
            sessionContainer.innerHTML = '';
            
            const sortedSessions = Object.keys(sessionData).sort();
            
            if(sortedSessions.length === 0) {
                sessionContainer.innerHTML = '<p class="text-sm text-gray-500">수행 내역이 없습니다.</p>';
            }

            sortedSessions.forEach(session => {
                const data = sessionData[session];
                let percent = data.total > 0 ? Math.round((data.completed / data.total) * 100) : 0;

                const html = `
                    <div class="flex items-center gap-4">
                        <span class="w-12 text-sm font-bold text-gray-600">${session}</span>
                        <div class="flex-1 bg-gray-100 h-2.5 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full rounded-full progress-bar-fill" style="width: 0%" data-width="${percent}%"></div>
                        </div>
                        <span class="w-10 text-right text-sm font-black text-gray-800">${percent}%</span>
                    </div>
                `;
                sessionContainer.insertAdjacentHTML('beforeend', html);
            });

            // 교재별 카드 그래프
            const textbookContainer = document.getElementById('textbookContainer');
            textbookContainer.innerHTML = '';

            if(Object.keys(textbookData).length === 0) {
                textbookContainer.innerHTML = '<p class="text-sm text-gray-500 p-4">교재 데이터가 없습니다.</p>';
            }

            Object.keys(textbookData).forEach(bookName => {
                const data = textbookData[bookName];
                let percent = data.total > 0 ? Math.round((data.completed / data.total) * 100) : 0;

                const html = `
                    <div class="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm">
                        <h3 class="font-bold text-gray-800 mb-6 text-sm truncate">${bookName}</h3>
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-xs text-gray-400 font-medium">(총 ${data.total}p)</span>
                            <span class="text-sm font-black text-blue-500">${percent}%</span>
                        </div>
                        <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden">
                            <div class="bg-blue-100 h-full rounded-full progress-bar-fill" style="width: 0%" data-width="${percent}%"></div>
                        </div>
                    </div>
                `;
                textbookContainer.insertAdjacentHTML('beforeend', html);
            });

            setTimeout(() => {
                document.querySelectorAll('.progress-bar-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-width');
                });
            }, 50);
        }
    </script>
</body>
</html>
