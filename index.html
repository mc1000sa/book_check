<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문산 열린학원 - 누적 학습 분석 리포트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f5f7;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .header-bg {
            background-color: #111827;
        }
        .progress-bar-fill {
            transition: width 1s ease-out;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 인쇄 최적화: 가로 1장 출력 완벽 고정 */
        @media print {
            @page {
                size: A4 landscape;
                margin: 0;
            }
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; margin: 0 !important; overflow: hidden !important; }
            #reportArea { 
                max-width: 100% !important; 
                width: 297mm !important; 
                min-height: 210mm !important;
                padding: 8mm !important; 
                margin: 0 auto !important;
                transform: scale(0.88); /* 전체 내용이 한 장에 쏙 들어오도록 배율 조정 */
                transform-origin: top center;
            }
            .header-bg { border-radius: 1rem !important; }
            .shadow-xl, .shadow-2xl { box-shadow: none !important; border: 1px solid #e5e7eb !important; }
            /* 내부 요소 간격 조정 */
            .grid { gap: 1rem !important; }
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 p-4 md:p-6 max-w-7xl mx-auto relative">

    <!-- 로딩 화면 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center no-print text-center">
        <div class="loader mb-4"></div>
        <p class="text-gray-900 font-black text-xl">학생 데이터를 분석 중입니다...</p>
        <p class="text-gray-500 text-sm mt-2">잠시만 기다려주세요, 문채 선생님!</p>
    </div>

    <!-- 상단 컨트롤 바 -->
    <div class="flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-6 border border-gray-100 no-print gap-4">
        <div class="flex items-center gap-2 w-full md:w-1/3">
            <select id="studentSelect" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 block p-3 outline-none font-bold cursor-pointer shadow-inner">
                <option value="">데이터 동기화 중...</option>
            </select>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
            <button onclick="window.print()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95 shadow-lg shadow-indigo-200">
                <i data-lucide="printer" class="w-4 h-4"></i> 출력
            </button>
            <button onclick="saveAsImage()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-gray-900 hover:bg-black text-white px-8 py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95 shadow-lg shadow-gray-300">
                <i data-lucide="download" class="w-4 h-4"></i> 이미지 저장
            </button>
        </div>
    </div>

    <!-- 리포트 본문 영역 (이미지 캡처 및 인쇄 대상) -->
    <div id="reportArea">
        <!-- 메인 헤더 -->
        <div class="header-bg rounded-[2rem] p-8 mb-8 text-white flex flex-col md:flex-row justify-between items-center shadow-2xl relative overflow-hidden">
            <div class="absolute right-0 top-0 w-80 h-80 bg-blue-500 opacity-10 rounded-full blur-3xl transform translate-x-1/3 -translate-y-1/3"></div>
            
            <div class="flex items-center gap-6 relative z-10">
                <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-md border border-white/10 shadow-inner">
                    <img src="열린학원로고(누끼).png" alt="열린학원 로고" class="h-12 object-contain" onerror="this.src='https://via.placeholder.com/150x50/111827/FFFFFF?text=Yeollin+Academy'">
                </div>
                <div class="h-12 w-px bg-gray-700 hidden md:block"></div>
                <div>
                    <div class="flex items-baseline gap-2 mb-1">
                        <h1 class="text-4xl font-black tracking-tight" id="headerName">-</h1>
                        <span class="text-blue-300 font-bold text-lg">학생</span>
                    </div>
                    <p class="text-sm text-gray-400 font-medium tracking-wide" id="classInfo">교재점검 누적리포트</p>
                </div>
            </div>

            <!-- TOTAL RATE -->
            <div class="mt-6 md:mt-0 bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-5 flex items-center gap-5 relative z-10 shadow-2xl">
                <div class="text-center">
                    <p class="text-[10px] text-gray-400 font-black tracking-[0.2em] uppercase mb-1">TOTAL PERFORMANCE</p>
                    <div class="flex items-baseline justify-center gap-1">
                        <span class="text-4xl font-black text-white" id="totalRate">0</span>
                        <span class="text-xl font-bold text-gray-500">%</span>
                    </div>
                </div>
                <div id="totalRateContainer" class="w-14 h-14 rounded-full flex items-center justify-center shadow-2xl text-white transition-all duration-700 transform hover:scale-110">
                    <i data-lucide="check" class="w-7 h-7 stroke-[4]"></i>
                </div>
            </div>
        </div>

        <!-- 2단 레이아웃 -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- 왼쪽: 수행 추이 및 코멘트 (4/12) -->
            <div class="lg:col-span-4 flex flex-col gap-8">
                <div>
                    <div class="flex items-center justify-between mb-4 px-2">
                        <div class="flex items-center gap-2">
                            <i data-lucide="bar-chart-3" class="w-5 h-5 text-indigo-600"></i>
                            <h2 class="text-xl font-black text-gray-800 tracking-tight">과제 수행 추이</h2>
                        </div>
                    </div>
                    <div class="bg-white rounded-[2rem] p-7 shadow-xl shadow-gray-200/50 border border-gray-100 min-h-[300px]">
                        <div class="space-y-7" id="sessionProgressContainer">
                            <!-- 회차별 막대 JS 생성 -->
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] p-8 shadow-xl shadow-indigo-100/50 border-t-4 border-indigo-500 relative mt-4 overflow-hidden">
                    <div class="absolute -right-4 -top-4 opacity-5">
                        <i data-lucide="quote" class="w-24 h-24 text-indigo-900"></i>
                    </div>
                    <h3 class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i data-lucide="message-square" class="w-4 h-4"></i> Teacher's Feedback
                    </h3>
                    <p id="teacherComment" class="text-[15px] text-gray-700 font-bold leading-relaxed whitespace-pre-wrap italic">
                        로딩 중...
                    </p>
                </div>
            </div>

            <!-- 오른쪽: 교재별 상세 현황 (8/12) -->
            <div class="lg:col-span-8">
                <div class="flex items-center gap-2 mb-4 px-2">
                    <i data-lucide="layers" class="w-5 h-5 text-blue-600"></i>
                    <h2 class="text-xl font-black text-gray-800 tracking-tight">교재별 누적 학습 현황</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="textbookContainer">
                    <!-- 교재 카드 JS 생성 -->
                </div>
            </div>
        </div>

        <!-- 워터마크 -->
        <div class="mt-12 pt-8 border-t border-gray-200 text-center opacity-30">
            <p class="text-[10px] text-gray-500 font-black tracking-[0.3em] uppercase">Moonsan Yeollin Math Premium Smart Report</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let globalSheetData = [];

        const colorPalette = [
            {bg: 'bg-blue-500', track: 'bg-blue-50', text: 'text-blue-600', dot: 'bg-blue-400'},
            {bg: 'bg-indigo-500', track: 'bg-indigo-50', text: 'text-indigo-600', dot: 'bg-indigo-400'},
            {bg: 'bg-violet-500', track: 'bg-violet-50', text: 'text-violet-600', dot: 'bg-violet-400'},
            {bg: 'bg-emerald-500', track: 'bg-emerald-50', text: 'text-emerald-600', dot: 'bg-emerald-400'},
            {bg: 'bg-rose-500', track: 'bg-rose-50', text: 'text-rose-600', dot: 'bg-rose-400'},
            {bg: 'bg-amber-500', track: 'bg-amber-50', text: 'text-amber-600', dot: 'bg-amber-400'}
        ];

        // 문채 선생님의 실제 구글 스크립트 API URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbya59NwpvmaaPXbhvuvIDf4spaGy_M7m4nzjgqykvlGUdIf6Hmd5veavpVal_ogFwpD9w/exec";

        function saveAsImage() {
            const captureTarget = document.getElementById('reportArea');
            html2canvas(captureTarget, { 
                scale: 2, 
                useCORS: true,
                backgroundColor: '#f4f5f7'
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `[열린학원]_` + document.getElementById('headerName').innerText + "_누적리포트.png";
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }

        window.onload = () => {
            fetch(GAS_URL)
                .then(res => res.json())
                .then(data => onDataLoaded(data))
                .catch(err => {
                    console.error(err);
                    document.getElementById('loadingOverlay').innerHTML = `<div class="p-8 bg-white rounded-3xl shadow-2xl text-center"><p class="text-red-500 font-black">데이터 동기화 실패.</p></div>`;
                });
        };

        function onDataLoaded(data) {
            globalSheetData = data;
            
            // 모든 학생 정보를 수집 (이름별로 반 정보를 정확하게 매핑)
            const studentMap = new Map();
            data.forEach(r => {
                if(r['이름']) {
                    const name = r['이름'].trim();
                    // 해당 이름에 대해 유효한 반 정보가 아직 없으면 저장
                    if (!studentMap.has(name) || (studentMap.get(name) === "미지정" && r['반'])) {
                        const classInfo = r['반'] || r['과정'] || "미지정";
                        studentMap.set(name, classInfo);
                    }
                }
            });

            const sel = document.getElementById('studentSelect');
            sel.innerHTML = '';
            
            // 학생 이름 가나다 순 정렬하여 드롭다운 생성
            const sortedNames = Array.from(studentMap.keys()).sort();
            
            sortedNames.forEach(name => {
                const classInfo = studentMap.get(name);
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = `[${classInfo}] ${name} 학생`;
                sel.appendChild(opt);
            });
            
            if(sortedNames.length > 0) {
                renderDashboard(sortedNames[0]);
            }
            
            sel.addEventListener('change', e => {
                renderDashboard(e.target.value);
            });
            
            document.getElementById('loadingOverlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 500);
        }

        function parseIncomplete(str) {
            if (!str) return { count: 0, text: "" };
            let count = 0;
            const parts = String(str).split(',');
            parts.forEach(p => {
                const c = p.trim();
                if (c.includes('~') || c.includes('-')) {
                    const sep = c.includes('~') ? '~' : '-';
                    const [s, e] = c.split(sep).map(Number);
                    if (!isNaN(s) && !isNaN(e)) count += (e - s + 1);
                } else if (c !== '' && !isNaN(Number(c))) {
                    count += 1;
                }
            });
            return { count, text: str };
        }

        function renderDashboard(name) {
            const sData = globalSheetData.filter(r => r['이름'] === name);
            document.getElementById('headerName').innerText = name;
            
            // 선택된 학생의 데이터 중 가장 첫 번째 유효한 '반' 정보 찾기
            const firstValidRow = sData.find(r => r['반'] || r['과정']);
            const currentClass = firstValidRow ? (firstValidRow['반'] || firstValidRow['과정']) : "고등부";
            document.getElementById('classInfo').innerText = `${currentClass} | 교재점검 누적리포트`;

            let totalP = 0, totalD = 0, lastC = "전달할 코멘트가 없습니다.";
            const sessionMap = {}, bookMap = {}, sessionColorMap = {};

            const sessionsFound = [...new Set(sData.map(r => r['회차'] || '기타'))].sort();
            sessionsFound.forEach((s, i) => {
                sessionColorMap[s] = colorPalette[i % colorPalette.length];
            });

            sData.forEach(row => {
                const start = parseInt(row['검사시작']) || 0;
                const end = parseInt(row['검사끝']) || 0;
                const rowTotal = (end >= start && end > 0) ? (end - start + 1) : 0;
                const inc = parseIncomplete(row['미완료']);
                const rowDone = Math.max(0, rowTotal - inc.count);

                totalP += rowTotal;
                totalD += rowDone;

                const sess = row['회차'] || '기타';
                if (!sessionMap[sess]) sessionMap[sess] = { t: 0, d: 0 };
                sessionMap[sess].t += rowTotal;
                sessionMap[sess].d += rowDone;

                const book = row['교재명'] || '미확인 교재';
                if (!bookMap[book]) bookMap[book] = { t: 0, d: 0, details: [] };
                bookMap[book].t += rowTotal;
                bookMap[book].d += rowDone;
                
                bookMap[book].details.push({
                    unit: row['단원명'] || row['대단원'] || row['단원'] || "교재 점검",
                    sess: sess,
                    start, end, rowTotal,
                    incText: inc.text,
                    percent: rowTotal > 0 ? Math.round((rowDone / rowTotal) * 100) : 0,
                    color: sessionColorMap[sess]
                });

                if (row['특이사항']) lastC = row['특이사항'];
            });

            const totalRate = totalP > 0 ? Math.round((totalD / totalP) * 100) : 0;
            document.getElementById('totalRate').innerText = totalRate;
            const trc = document.getElementById('totalRateContainer');
            trc.className = "w-14 h-14 rounded-full flex items-center justify-center shadow-2xl text-white transition-all duration-700";
            if (totalRate >= 90) trc.classList.add('bg-emerald-500', 'shadow-emerald-500/50');
            else if (totalRate >= 70) trc.classList.add('bg-blue-600', 'shadow-blue-600/50');
            else trc.classList.add('bg-rose-500', 'shadow-rose-500/50');

            document.getElementById('teacherComment').innerText = `"${lastC}"`;

            const sessCont = document.getElementById('sessionProgressContainer');
            sessCont.innerHTML = '';
            Object.keys(sessionMap).sort().forEach(k => {
                const d = sessionMap[k];
                const p = d.t > 0 ? Math.round((d.d / d.t) * 100) : 0;
                const col = sessionColorMap[k];
                sessCont.insertAdjacentHTML('beforeend', `
                    <div class="flex flex-col gap-1.5">
                        <div class="flex justify-between items-end px-1">
                            <span class="text-sm font-black text-gray-700">${k}</span>
                            <span class="text-xs font-black ${col.text}">${p}%</span>
                        </div>
                        <div class="w-full ${col.track} h-3 rounded-full overflow-hidden shadow-inner">
                            <div class="${col.bg} h-full rounded-full progress-bar-fill shadow-lg" style="width: 0%" data-width="${p}%"></div>
                        </div>
                    </div>`);
            });

            const bookCont = document.getElementById('textbookContainer');
            bookCont.innerHTML = '';
            Object.keys(bookMap).forEach(b => {
                const data = bookMap[b];
                const p = data.t > 0 ? Math.round((data.d / data.t) * 100) : 0;
                
                let detailsHtml = data.details.map(item => `
                    <div class="border-b border-gray-50 last:border-0 py-4">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="w-2.5 h-2.5 rounded-full ${item.color.bg} shadow-sm"></span>
                                    <p class="text-sm font-black text-gray-800 leading-tight">${item.unit}</p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-black ${item.color.text} uppercase tracking-wider">${item.sess}</span>
                                    <span class="text-[11px] text-gray-400 font-bold bg-gray-50 px-2 py-0.5 rounded">
                                        ${item.start}p ~ ${item.end}p (총 ${item.rowTotal}p)
                                    </span>
                                </div>
                            </div>
                            <div class="text-right ml-3">
                                <span class="text-sm font-black ${item.percent >= 90 ? 'text-blue-600' : 'text-rose-500'}">${item.percent}%</span>
                            </div>
                        </div>
                        <div class="w-full ${item.color.track} h-2 rounded-full overflow-hidden mb-1">
                            <div class="${item.color.bg} h-full rounded-full progress-bar-fill" style="width: 0%" data-width="${item.percent}%"></div>
                        </div>
                        ${item.incText ? `<p class="text-[10px] text-rose-500 font-black mt-2 bg-rose-50 px-2 py-1 rounded inline-block">▲ 미완료: ${item.incText}p</p>` : ''}
                    </div>`).join('');

                bookCont.insertAdjacentHTML('beforeend', `
                    <div class="bg-white rounded-[2rem] border border-gray-100 p-8 shadow-xl shadow-gray-200/40 flex flex-col hover:shadow-2xl transition-all duration-300">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 class="font-black text-gray-900 text-xl tracking-tighter mb-1">${b}</h3>
                                <p class="text-[10px] text-gray-400 font-black tracking-widest uppercase tracking-tighter">Cumulative Progress</p>
                            </div>
                            <div class="bg-indigo-50 px-3 py-1 rounded-xl border border-indigo-100">
                                <span class="text-2xl font-black text-indigo-600">${p}</span>
                                <span class="text-xs font-bold text-indigo-300">%</span>
                            </div>
                        </div>
                        <div class="w-full bg-gray-50 h-3 rounded-full overflow-hidden mb-6 shadow-inner">
                            <div class="bg-indigo-500 h-full rounded-full progress-bar-fill shadow-lg" style="width: 0%" data-width="${p}%"></div>
                        </div>
                        <div class="mt-4 pt-4 border-t-2 border-dashed border-gray-100">
                            <p class="text-[9px] font-black text-gray-300 uppercase tracking-[0.4em] mb-4">Detailed Unit Progress</p>
                            ${detailsHtml}
                        </div>
                    </div>`);
            });

            setTimeout(() => {
                document.querySelectorAll('.progress-bar-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-width');
                });
            }, 50);
        }
    </script>
</body>
</html>
