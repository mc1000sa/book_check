<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문산 열린학원 스마트 리포트</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    * { box-sizing: border-box; }

    body {
      background-color: #f1f5f9;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      line-height: 1.4;
    }

    @media print {
      @page {
        size: A4 landscape;
        margin: 5mm;
      }
      body {
        background-color: white !important;
        padding: 0 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .no-print { display: none !important; }
      #capture-wrapper {
        background-color: white !important;
        padding: 0 !important;
      }
      #wide-dashboard {
        width: 287mm !important;
        height: 200mm !important;
        max-width: none !important;
        margin: auto !important;
        border-radius: 32px !important;
        box-shadow: none !important;
        border: 2px solid #e2e8f0 !important;
        overflow: hidden !important;
        page-break-after: avoid;
        page-break-inside: avoid;
      }
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
    const IconTrend = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
    const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
    const IconMsg = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>;
    const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
    const IconSend = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
    const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;

    const colorPalette = ["#3b82f6", "#9333ea", "#0ea5e9", "#eab308", "#ec4899", "#10b981", "#f97316", "#14b8a6"];
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbya59NwpvmaaPXbhvuvIDf4spaGy_M7m4nzjgqykvlGUdIf6Hmd5veavpVal_ogFwpD9w/exec";
    const LOGO_FILENAME = "./열린학원로고(누끼).png";

    function App() {
      const [loading, setLoading] = useState(true);
      const [students, setStudents] = useState([]);
      const [selectedIdx, setSelectedIdx] = useState(0);
      const [error, setError] = useState("");
      const [isParentView, setIsParentView] = useState(false);

      useEffect(() => {
        const fetchData = async () => {
          try {
            const urlParams = new URLSearchParams(window.location.search);
            const nameParam = urlParams.get('name');
            const response = await fetch(GAS_API_URL);
            const result = await response.json();

            if (result.error) {
              setError(result.error);
            } else {
              setStudents(result.data);
              if (nameParam) {
                const idx = result.data.findIndex(s => s.name === nameParam);
                if (idx !== -1) {
                  setSelectedIdx(idx);
                  setIsParentView(true);
                }
              }
            }
            setLoading(false);
          } catch (err) {
            setError("데이터 로드 실패: " + err.message);
            setLoading(false);
          }
        };
        fetchData();
      }, []);

      if (loading) {
        return <div className="flex justify-center items-center h-screen bg-slate-900"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div></div>;
      }

      if (error) {
        return <div className="p-10 text-center"><h2 className="text-red-600 font-bold text-2xl mb-4">안내</h2><p>{error}</p></div>;
      }

      const data = students[selectedIdx];

      let allSessions = [];
      if (data && data.books) {
        data.books.forEach(b => b.units.forEach(u => u.sessions.forEach(s => {
          if (!allSessions.includes(s.name)) allSessions.push(s.name);
        })));
      }
      allSessions.sort();

      const getRateStyle = (rate) => {
        if (rate < 50) return { bg: 'bg-rose-500', text: 'text-rose-200' };
        if (rate < 70) return { bg: 'bg-purple-500', text: 'text-purple-200' };
        if (rate < 90) return { bg: 'bg-emerald-500', text: 'text-emerald-200' };
        return { bg: 'bg-blue-500', text: 'text-blue-200' };
      };
      const rateStyle = getRateStyle(data.overallRate);

      const handlePrint = () => {
        const originalTitle = document.title;
        document.title = `[열린 교재점검 리포트]_${data.name}`;
        window.print();
        document.title = originalTitle;
      };

      const handleSendSMS = () => {
        const baseUrl = window.location.href.split('?')[0];
        const reportUrl = `${baseUrl}?name=${encodeURIComponent(data.name)}`;
        const message = `[문산열린학원]\n${data.name} 학생 수학 교재점검 리포트\n▶ 수행률: ${data.overallRate}%\n▶ 링크확인: ${reportUrl}`;
        window.location.href = `sms:${data.phoneParent}?body=${encodeURIComponent(message)}`;
      };

      const buildCaptureDOM = (data, allSessions) => {
        const outer = document.createElement('div');
        outer.style.position = 'fixed';
        outer.style.left = '0';
        outer.style.top = '0';
        outer.style.width = '1050px';
        outer.style.height = '700px';
        outer.style.background = '#ffffff';
        outer.style.padding = '0';
        outer.style.margin = '0';
        outer.style.zIndex = '-9999';
        outer.style.overflow = 'hidden';
        outer.style.fontFamily = "'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif";
        outer.style.boxSizing = 'border-box';

        const card = document.createElement('div');
        card.style.width = '1050px';
        card.style.height = '700px';
        card.style.background = '#ffffff';
        card.style.border = '1px solid #e2e8f0';
        card.style.borderRadius = '32px';
        card.style.overflow = 'hidden';
        card.style.boxShadow = '0 20px 40px rgba(15,23,42,0.12)';
        card.style.position = 'relative';
        card.style.boxSizing = 'border-box';

        const header = document.createElement('div');
        header.style.height = '138px';
        header.style.background = '#0f172a';
        header.style.color = '#ffffff';
        header.style.padding = '24px 32px';
        header.style.display = 'flex';
        header.style.justifyContent = 'space-between';
        header.style.alignItems = 'center';
        header.style.boxSizing = 'border-box';

        const headerLeft = document.createElement('div');
        headerLeft.style.display = 'flex';
        headerLeft.style.alignItems = 'center';
        headerLeft.style.gap = '24px';

        const logo = document.createElement('img');
        logo.src = LOGO_FILENAME;
        logo.style.height = '40px';
        logo.style.objectFit = 'contain';
        logo.style.filter = 'brightness(0) invert(1) opacity(0.85)';
        logo.onerror = () => { logo.style.display = 'none'; };

        const divider = document.createElement('div');
        divider.style.width = '1px';
        divider.style.height = '32px';
        divider.style.background = '#334155';

        const titleWrap = document.createElement('div');

        const titleRow = document.createElement('div');
        titleRow.style.display = 'flex';
        titleRow.style.alignItems = 'flex-end';
        titleRow.style.gap = '8px';
        titleRow.style.lineHeight = '1';

        const title = document.createElement('div');
        title.textContent = data.name;
        title.style.fontSize = '50px';
        title.style.fontWeight = '900';
        title.style.color = '#ffffff';
        title.style.lineHeight = '1';

        const titleSub = document.createElement('div');
        titleSub.textContent = '학생';
        titleSub.style.fontSize = '24px';
        titleSub.style.fontWeight = '500';
        titleSub.style.color = '#94a3b8';
        titleSub.style.lineHeight = '1';
        titleSub.style.paddingBottom = '4px';

        const classText = document.createElement('div');
        classText.textContent = `${data.className} | 교재점검 누적리포트`;
        classText.style.marginTop = '8px';
        classText.style.fontSize = '13px';
        classText.style.fontWeight = '700';
        classText.style.color = '#94a3b8';
        classText.style.lineHeight = '1.2';

        titleRow.appendChild(title);
        titleRow.appendChild(titleSub);
        titleWrap.appendChild(titleRow);
        titleWrap.appendChild(classText);

        headerLeft.appendChild(logo);
        headerLeft.appendChild(divider);
        headerLeft.appendChild(titleWrap);

        const rateBox = document.createElement('div');
        rateBox.style.display = 'flex';
        rateBox.style.alignItems = 'center';
        rateBox.style.gap = '16px';
        rateBox.style.background = 'rgba(30,41,59,0.7)';
        rateBox.style.border = '1px solid #334155';
        rateBox.style.borderRadius = '18px';
        rateBox.style.padding = '16px 24px';

        const rateTextWrap = document.createElement('div');
        rateTextWrap.style.textAlign = 'right';

        const rateLabel = document.createElement('div');
        rateLabel.textContent = 'TOTAL RATE';
        rateLabel.style.fontSize = '12px';
        rateLabel.style.fontWeight = '900';
        rateLabel.style.color = '#ffffff';
        rateLabel.style.letterSpacing = '0.12em';
        rateLabel.style.lineHeight = '1.2';
        rateLabel.style.marginBottom = '6px';

        const rateValue = document.createElement('div');
        rateValue.textContent = `${data.overallRate}%`;
        rateValue.style.fontSize = '28px';
        rateValue.style.fontWeight = '900';
        rateValue.style.lineHeight = '1';
        rateValue.style.color =
          data.overallRate < 50 ? '#fecdd3' :
          data.overallRate < 70 ? '#e9d5ff' :
          data.overallRate < 90 ? '#a7f3d0' : '#bfdbfe';

        const rateCircle = document.createElement('div');
        rateCircle.textContent = '✓';
        rateCircle.style.width = '54px';
        rateCircle.style.height = '54px';
        rateCircle.style.borderRadius = '9999px';
        rateCircle.style.display = 'flex';
        rateCircle.style.alignItems = 'center';
        rateCircle.style.justifyContent = 'center';
        rateCircle.style.fontWeight = '900';
        rateCircle.style.fontSize = '24px';
        rateCircle.style.color = '#ffffff';
        rateCircle.style.background =
          data.overallRate < 50 ? '#f43f5e' :
          data.overallRate < 70 ? '#a855f7' :
          data.overallRate < 90 ? '#10b981' : '#3b82f6';

        rateTextWrap.appendChild(rateLabel);
        rateTextWrap.appendChild(rateValue);
        rateBox.appendChild(rateTextWrap);
        rateBox.appendChild(rateCircle);

        header.appendChild(headerLeft);
        header.appendChild(rateBox);

        const body = document.createElement('div');
        body.style.height = '504px';
        body.style.padding = '28px 32px';
        body.style.boxSizing = 'border-box';
        body.style.display = 'flex';
        body.style.gap = '32px';
        body.style.alignItems = 'flex-start';

        const leftCol = document.createElement('div');
        leftCol.style.width = '31%';

        const leftTitleRow = document.createElement('div');
        leftTitleRow.style.height = '24px';
        leftTitleRow.style.display = 'flex';
        leftTitleRow.style.alignItems = 'center';
        leftTitleRow.style.gap = '8px';
        leftTitleRow.style.marginBottom = '12px';
        leftTitleRow.innerHTML = `<span style="display:inline-flex;align-items:center;justify-content:center;color:#111827;">${document.querySelector('svg') ? '' : ''}</span><div style="font-size:15px;font-weight:900;color:#1f2937;line-height:1;">최근 과제 수행 추이</div>`;

        const trendBox = document.createElement('div');
        trendBox.style.background = '#ffffff';
        trendBox.style.border = '1px solid #e2e8f0';
        trendBox.style.borderRadius = '24px';
        trendBox.style.padding = '22px 24px';
        trendBox.style.boxShadow = '0 1px 2px rgba(15,23,42,0.04)';
        trendBox.style.marginBottom = '26px';

        const sessionRates = data.sessionRates.slice(-4);
        sessionRates.forEach((s) => {
          const row = document.createElement('div');
          row.style.display = 'flex';
          row.style.alignItems = 'center';
          row.style.marginBottom = '24px';

          const label = document.createElement('div');
          label.textContent = s.session;
          label.style.width = '60px';
          label.style.fontSize = '12px';
          label.style.fontWeight = '700';
          label.style.color = '#64748b';

          const barWrap = document.createElement('div');
          barWrap.style.flex = '1';
          barWrap.style.height = '12px';
          barWrap.style.background = '#e2e8f0';
          barWrap.style.borderRadius = '9999px';
          barWrap.style.overflow = 'hidden';
          barWrap.style.margin = '0 16px';

          const cIdx = allSessions.indexOf(s.session);
          const barColor = cIdx !== -1 ? colorPalette[cIdx % colorPalette.length] : '#3b82f6';

          const bar = document.createElement('div');
          bar.style.width = `${s.rate}%`;
          bar.style.height = '100%';
          bar.style.background = barColor;

          const rate = document.createElement('div');
          rate.textContent = `${s.rate}%`;
          rate.style.width = '52px';
          rate.style.textAlign = 'right';
          rate.style.fontSize = '12px';
          rate.style.fontWeight = '900';
          rate.style.color = '#1f2937';

          barWrap.appendChild(bar);
          row.appendChild(label);
          row.appendChild(barWrap);
          row.appendChild(rate);
          trendBox.appendChild(row);
        });
        if (trendBox.lastChild) trendBox.lastChild.style.marginBottom = '0';

        const commentWrap = document.createElement('div');
        commentWrap.style.position = 'relative';
        commentWrap.style.background = 'rgba(238,242,255,0.65)';
        commentWrap.style.border = '1px solid #c7d2fe';
        commentWrap.style.borderRadius = '24px';
        commentWrap.style.padding = '34px 24px 24px 24px';

        const commentBadge = document.createElement('div');
        commentBadge.textContent = "Teacher's Comment";
        commentBadge.style.position = 'absolute';
        commentBadge.style.left = '24px';
        commentBadge.style.top = '-16px';
        commentBadge.style.background = '#ffffff';
        commentBadge.style.border = '1px solid #c7d2fe';
        commentBadge.style.borderRadius = '9999px';
        commentBadge.style.padding = '10px 18px';
        commentBadge.style.fontSize = '12px';
        commentBadge.style.fontWeight = '900';
        commentBadge.style.color = '#4f46e5';
        commentBadge.style.lineHeight = '1';

        const commentText = document.createElement('div');
        commentText.textContent = data.teacherComment || "열심히 하고 있습니다. 오답 보완에 좀 더 집중합시다!";
        commentText.style.fontSize = '12px';
        commentText.style.fontWeight = '700';
        commentText.style.color = '#334155';
        commentText.style.lineHeight = '1.7';
        commentText.style.whiteSpace = 'pre-wrap';

        commentWrap.appendChild(commentBadge);
        commentWrap.appendChild(commentText);

        leftCol.appendChild(leftTitleRow);
        leftCol.appendChild(trendBox);
        leftCol.appendChild(commentWrap);

        const rightCol = document.createElement('div');
        rightCol.style.width = '69%';

        const rightTop = document.createElement('div');
        rightTop.style.height = '24px';
        rightTop.style.display = 'flex';
        rightTop.style.justifyContent = 'space-between';
        rightTop.style.alignItems = 'center';
        rightTop.style.marginBottom = '12px';

        const rightTitle = document.createElement('div');
        rightTitle.textContent = '단원별 누적 학습 현황';
        rightTitle.style.fontSize = '15px';
        rightTitle.style.fontWeight = '900';
        rightTitle.style.color = '#1f2937';
        rightTitle.style.lineHeight = '1';

        const legend = document.createElement('div');
        legend.style.display = 'flex';
        legend.style.gap = '8px';

        allSessions.forEach((sess, idx) => {
          const item = document.createElement('div');
          item.style.display = 'flex';
          item.style.alignItems = 'center';
          item.style.gap = '6px';
          item.style.padding = '6px 10px';
          item.style.background = '#f1f5f9';
          item.style.borderRadius = '8px';
          item.style.fontSize = '10px';
          item.style.fontWeight = '700';
          item.style.color = '#64748b';

          const dot = document.createElement('div');
          dot.style.width = '7px';
          dot.style.height = '7px';
          dot.style.borderRadius = '9999px';
          dot.style.background = colorPalette[idx % colorPalette.length];

          const txt = document.createElement('div');
          txt.textContent = sess;

          item.appendChild(dot);
          item.appendChild(txt);
          legend.appendChild(item);
        });

        rightTop.appendChild(rightTitle);
        rightTop.appendChild(legend);

        const booksWrap = document.createElement('div');
        booksWrap.style.display = 'flex';
        booksWrap.style.gap = '16px';
        booksWrap.style.alignItems = 'flex-start';

        data.books.forEach((book) => {
          const bookCard = document.createElement('div');
          bookCard.style.flex = '1';
          bookCard.style.background = '#ffffff';
          bookCard.style.border = '1px solid #e2e8f0';
          bookCard.style.borderRadius = '24px';
          bookCard.style.overflow = 'hidden';
          bookCard.style.boxShadow = '0 1px 2px rgba(15,23,42,0.04)';

          const bookHead = document.createElement('div');
          bookHead.textContent = book.name;
          bookHead.style.background = '#f8fafc';
          bookHead.style.padding = '14px 16px';
          bookHead.style.borderBottom = '1px solid #f1f5f9';
          bookHead.style.fontSize = '13px';
          bookHead.style.fontWeight = '900';
          bookHead.style.color = '#1f2937';
          bookHead.style.lineHeight = '1.2';

          const bookBody = document.createElement('div');
          bookBody.style.padding = '16px';
          bookBody.style.boxSizing = 'border-box';

          book.units.forEach((unit, idx) => {
            const done = unit.sessions.reduce((a, b) => a + b.pagesDone, 0);
            const rate = unit.totalPages > 0 ? Math.round((done / unit.totalPages) * 100) : 0;

            const unitWrap = document.createElement('div');
            unitWrap.style.marginBottom = idx === book.units.length - 1 ? '0' : '24px';

            const unitTop = document.createElement('div');
            unitTop.style.display = 'flex';
            unitTop.style.justifyContent = 'space-between';
            unitTop.style.alignItems = 'flex-end';
            unitTop.style.gap = '8px';
            unitTop.style.marginBottom = '7px';

            const unitName = document.createElement('div');
            unitName.style.fontSize = '10px';
            unitName.style.fontWeight = '700';
            unitName.style.color = '#475569';
            unitName.style.lineHeight = '1.3';
            unitName.textContent = unit.startPage && unit.endPage
              ? `${unit.name} (${unit.startPage}p~${unit.endPage}p, 총 ${unit.totalPages}p)`
              : `${unit.name} (총 ${unit.totalPages}p)`;

            const unitRate = document.createElement('div');
            unitRate.textContent = `${rate}%`;
            unitRate.style.flexShrink = '0';
            unitRate.style.marginLeft = '8px';
            unitRate.style.fontSize = '10px';
            unitRate.style.fontWeight = '900';
            unitRate.style.lineHeight = '1';
            unitRate.style.color = rate >= 100 ? '#2563eb' : '#94a3b8';

            const unitBar = document.createElement('div');
            unitBar.style.width = '100%';
            unitBar.style.height = '18px';
            unitBar.style.background = '#e2e8f0';
            unitBar.style.borderRadius = '9999px';
            unitBar.style.overflow = 'hidden';
            unitBar.style.display = 'flex';

            unit.sessions.forEach((s, si) => {
              const seg = document.createElement('div');
              seg.style.height = '100%';
              seg.style.width = `${(s.pagesDone / unit.totalPages) * 100}%`;
              const sessionIdx = allSessions.indexOf(s.name);
              seg.style.background = sessionIdx !== -1 ? colorPalette[sessionIdx % colorPalette.length] : '#3b82f6';
              if (si < unit.sessions.length - 1) {
                seg.style.borderRight = '1px solid rgba(255,255,255,0.2)';
              }
              unitBar.appendChild(seg);
            });

            unitTop.appendChild(unitName);
            unitTop.appendChild(unitRate);
            unitWrap.appendChild(unitTop);
            unitWrap.appendChild(unitBar);

            if (unit.uncompleted && String(unit.uncompleted).trim() !== "") {
              const alert = document.createElement('div');
              alert.textContent = String(unit.uncompleted).includes('결석')
                ? '결석'
                : `미완료: ${unit.uncompleted}p`;
              alert.style.marginTop = '7px';
              alert.style.fontSize = '8px';
              alert.style.fontWeight = '900';
              alert.style.color = '#f43f5e';
              alert.style.lineHeight = '1.2';
              unitWrap.appendChild(alert);
            }

            bookBody.appendChild(unitWrap);
          });

          bookCard.appendChild(bookHead);
          bookCard.appendChild(bookBody);
          booksWrap.appendChild(bookCard);
        });

        rightCol.appendChild(rightTop);
        rightCol.appendChild(booksWrap);

        body.appendChild(leftCol);
        body.appendChild(rightCol);

        const footer = document.createElement('div');
        footer.style.height = '58px';
        footer.style.background = '#f8fafc';
        footer.style.borderTop = '1px solid #f1f5f9';
        footer.style.display = 'flex';
        footer.style.alignItems = 'center';
        footer.style.justifyContent = 'center';

        const footerText = document.createElement('div');
        footerText.textContent = 'MOONSAN YEOLLIN MATH PREMIUM SMART REPORT SYSTEM';
        footerText.style.fontSize = '9px';
        footerText.style.fontWeight = '900';
        footerText.style.color = '#cbd5e1';
        footerText.style.letterSpacing = '0.42em';
        footerText.style.lineHeight = '1';

        footer.appendChild(footerText);

        card.appendChild(header);
        card.appendChild(body);
        card.appendChild(footer);
        outer.appendChild(card);

        return { outer, card };
      };

      const handleDownloadImage = async () => {
        try {
          await document.fonts.ready;

          const { outer, card } = buildCaptureDOM(data, allSessions);
          document.body.appendChild(outer);

          await new Promise(resolve => setTimeout(resolve, 250));

          const canvas = await html2canvas(card, {
            scale: 2,
            backgroundColor: '#ffffff',
            useCORS: true,
            logging: false,
            width: 1050,
            height: 700,
            scrollX: 0,
            scrollY: 0,
            windowWidth: 1050,
            windowHeight: 700
          });

          const link = document.createElement('a');
          link.download = `[열린 교재점검 리포트]_${data.name}.png`;
          link.href = canvas.toDataURL('image/png', 1.0);
          link.click();

          document.body.removeChild(outer);
        } catch (err) {
          alert("이미지 저장 중 오류가 발생했습니다: " + err.message);
        }
      };

      return (
        <div className="min-h-screen flex flex-col items-center p-0 bg-slate-100">
          {!isParentView && (
            <div className="no-print w-full max-w-[1050px] mt-4 mb-2 flex items-center justify-between bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
              <select
                className="bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-2 font-bold outline-none cursor-pointer"
                value={selectedIdx}
                onChange={(e) => setSelectedIdx(Number(e.target.value))}
              >
                {students.map((s, i) => (
                  <option key={i} value={i}>[{s.className}] {s.name}</option>
                ))}
              </select>

              <div className="flex gap-2">
                <button onClick={handlePrint} className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-md hover:bg-indigo-700 transition active:scale-95 flex items-center gap-1.5"><IconPrinter /> 출력</button>
                <button onClick={handleSendSMS} className="bg-white border-2 border-blue-600 text-blue-600 px-4 py-2 rounded-xl font-bold text-sm hover:bg-blue-50 transition active:scale-95 flex items-center gap-1.5"><IconSend /> 링크 전송</button>
                <button onClick={handleDownloadImage} className="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-md hover:bg-slate-700 transition active:scale-95 flex items-center gap-1.5"><IconDownload /> 이미지 저장</button>
              </div>
            </div>
          )}

          <div id="capture-wrapper" className="w-full flex justify-center bg-slate-100 p-4 pb-12">
            <div id="wide-dashboard" className="w-full max-w-[1050px] bg-white rounded-[32px] shadow-2xl border border-slate-200 flex flex-col min-h-[700px] overflow-hidden">

              <div className="bg-slate-900 text-white px-8 py-6 flex justify-between items-center relative">
                <div className="flex items-center gap-6">
                  <img
                    src={LOGO_FILENAME}
                    alt="Logo"
                    className="h-10 object-contain drop-shadow-md"
                    style={{ filter: 'brightness(0) invert(1) opacity(0.85)' }}
                    onError={(e) => e.target.style.display='none'}
                  />
                  <div className="h-8 w-px bg-slate-700"></div>
                  <div>
                    <h2 className="text-3xl font-black leading-tight flex items-end gap-2">
                      {data.name}
                      <span className="text-lg font-medium text-slate-400 mb-0.5">학생</span>
                    </h2>
                    <p className="text-slate-400 text-xs font-bold mt-1 uppercase tracking-tighter leading-tight">
                      {data.className} | 교재점검 누적리포트
                    </p>
                  </div>
                </div>

                <div className="flex items-center gap-4 bg-slate-800/50 px-6 py-3 rounded-2xl border border-slate-700">
                  <div className="text-right">
                    <p className="text-[10px] font-black text-white uppercase tracking-widest leading-tight mb-1">TOTAL RATE</p>
                    <p className={`text-2xl font-black ${rateStyle.text} leading-tight`}>{data.overallRate}%</p>
                  </div>
                  <div className={`w-10 h-10 rounded-full ${rateStyle.bg} flex items-center justify-center font-black text-white shadow-lg`}>✓</div>
                </div>
              </div>

              <div className="p-8 grid grid-cols-12 gap-8 flex-1 items-start">
                <div className="col-span-4 flex flex-col gap-6">
                  <div className="flex flex-col">
                    <div className="flex items-center gap-2 mb-2 h-6">
                      <IconTrend />
                      <h3 className="text-sm font-black text-slate-800 tracking-tight">최근 과제 수행 추이</h3>
                    </div>

                    <section className="bg-white rounded-[24px] p-6 border border-slate-200 shadow-sm">
                      <div className="flex flex-col gap-6">
                        {data.sessionRates.slice(-4).map((s, i) => {
                          const cIdx = allSessions.indexOf(s.session);
                          const barColor = cIdx !== -1 ? colorPalette[cIdx % colorPalette.length] : '#3b82f6';

                          return (
                            <div key={i} className="flex items-center justify-between">
                              <span className="text-xs font-bold text-slate-500">{s.session}</span>
                              <div className="flex-1 mx-4 h-2 bg-slate-200 rounded-full overflow-hidden">
                                <div className="h-full" style={{ width: `${s.rate}%`, backgroundColor: barColor }}></div>
                              </div>
                              <span className="text-xs font-black text-slate-800 w-8 text-right">{s.rate}%</span>
                            </div>
                          );
                        })}
                      </div>
                    </section>
                  </div>

                  <section className="bg-indigo-50/50 rounded-[24px] p-6 border border-indigo-100 relative mt-2 flex-none">
                    <div className="absolute -top-4 left-6 bg-white px-4 py-1.5 rounded-full border border-indigo-100 flex items-center gap-2 text-indigo-600 font-black text-[11px] shadow-sm">
                      <IconMsg /> Teacher's Comment
                    </div>
                    <p className="text-slate-700 text-xs leading-relaxed font-bold whitespace-pre-wrap pt-3">
                      {data.teacherComment || "열심히 하고 있습니다. 오답 보완에 좀 더 집중합시다!"}
                    </p>
                  </section>
                </div>

                <div className="col-span-8 flex flex-col">
                  <div className="flex justify-between items-center mb-2 h-6">
                    <h3 className="text-sm font-black text-slate-800 flex items-center gap-2">
                      <IconBook /> 단원별 누적 학습 현황
                    </h3>
                    <div className="flex gap-2">
                      {allSessions.map((sess, idx) => (
                        <div key={idx} className="flex items-center gap-1 px-2 py-1 bg-slate-100 rounded-md text-[9px] font-bold text-slate-500">
                          <div className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: colorPalette[idx % colorPalette.length] }}></div>
                          {sess}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className={`grid gap-4 ${data.books.length > 1 ? 'grid-cols-2' : 'grid-cols-1'} items-start`}>
                    {data.books.map((book, bIdx) => (
                      <div key={bIdx} className="bg-white rounded-[24px] border border-slate-200 shadow-sm flex flex-col overflow-hidden">
                        <div className="bg-slate-50 px-4 py-3 border-b border-slate-100 text-xs font-black text-slate-800">
                          {book.name}
                        </div>

                        <div className="p-4 flex flex-col gap-5">
                          {book.units.map((unit, uIdx) => {
                            const done = unit.sessions.reduce((a, b) => a + b.pagesDone, 0);
                            const rate = unit.totalPages > 0 ? Math.round((done / unit.totalPages) * 100) : 0;

                            return (
                              <div key={uIdx} className="flex flex-col gap-1.5">
                                <div className="flex justify-between items-end text-[10px] font-bold">
                                  <span className="text-slate-600 break-keep leading-tight">
                                    {unit.name}
                                    <span className="text-slate-400 font-normal ml-0.5">
                                      {unit.startPage && unit.endPage
                                        ? `(${unit.startPage}p~${unit.endPage}p, 총 ${unit.totalPages}p)`
                                        : `(총 ${unit.totalPages}p)`}
                                    </span>
                                  </span>
                                  <span className={`shrink-0 ml-2 leading-tight ${rate >= 100 ? 'text-blue-600' : 'text-slate-400'}`}>
                                    {rate}%
                                  </span>
                                </div>

                                <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden flex shadow-inner">
                                  {unit.sessions.map((s, si) => {
                                    const w = (s.pagesDone / unit.totalPages) * 100;
                                    const sessionIdx = allSessions.indexOf(s.name);
                                    const c = sessionIdx !== -1 ? colorPalette[sessionIdx % colorPalette.length] : '#3b82f6';

                                    return (
                                      <div
                                        key={si}
                                        style={{ width: `${w}%`, backgroundColor: c }}
                                        className="h-full border-r border-white/20 last:border-0"
                                      />
                                    );
                                  })}
                                </div>

                                {unit.uncompleted && String(unit.uncompleted).trim() !== "" && (
                                  <div className="flex items-center gap-1 text-[8px] font-black text-rose-500 leading-none mt-0.5">
                                    <IconAlert />
                                    {String(unit.uncompleted).includes('결석')
                                      ? '결석'
                                      : `미완료: ${unit.uncompleted}p`}
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="bg-slate-50 px-8 py-4 text-center border-t border-slate-100 mt-auto">
                <p className="text-[9px] font-black text-slate-300 tracking-[0.4em] uppercase">
                  Moonsan Yeollin Math Premium Smart Report System
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
